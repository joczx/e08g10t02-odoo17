trigger:
  branches:
    include:
      - Staging
      - Staging-vm2
      - master-vm2
      - master-vm3
      - monitoring-staging
      - monitoring-master

pool:
  name: Default

variables:
  repoUrl: 'https://github.com/joczx/e08g10t02-odoo17.git'
  updateScript: '/home/is214/deploy-temp/update_code.sh'
  stagePath: '/home/is214/'
  dockerProjectPath: '/home/is214/e08g10t02-odoo17'

stages:

# =========================
# STAGING - VM3
# =========================
- stage: StagingVM3
  displayName: Deploy to VM3 (Staging)
  condition: eq(variables['Build.SourceBranchName'], 'Staging')

  jobs:
  - deployment: DeployStagingVM3
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:
          - task: SSH@0
            displayName: "Stop Old Containers"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                echo "=== Stopping old containers ==="
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml stop 2>&1 || true
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml rm -f 2>&1 || true

          - task: SSH@0
            displayName: "Pull Latest Code"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                sudo rm -rf /home/is214/e08g10t02-odoo17
                sudo git clone -b Staging https://github.com/joczx/e08g10t02-odoo17.git /home/is214/e08g10t02-odoo17 2>&1
                sudo chown -R is214:is214 /home/is214/e08g10t02-odoo17

          - task: SSH@0
            displayName: "Write Environment File"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                echo "ODOO_PG_HOST=$(ODOO_PG_HOST)" > /home/is214/e08g10t02-odoo17/.env
                echo "ODOO_PG_PORT=$(ODOO_PG_PORT)" >> /home/is214/e08g10t02-odoo17/.env
                echo "ODOO_PG_USER=$(ODOO_PG_USER)" >> /home/is214/e08g10t02-odoo17/.env
                echo "ODOO_PG_PASSWORD=$(ODOO_PG_PASSWORD)" >> /home/is214/e08g10t02-odoo17/.env
                echo "ODOO_PG_DB=$(ODOO_PG_DB)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_HOST=$(MOODLE_PG_HOST)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_PORT=$(MOODLE_PG_PORT)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_USER=$(MOODLE_PG_USER)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_PASSWORD=$(MOODLE_PG_PASSWORD)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_DB=$(MOODLE_PG_DB)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_SCHEMA=$(MOODLE_PG_SCHEMA)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_USERNAME=$(MOODLE_USERNAME)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PASSWORD=$(MOODLE_PASSWORD)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_EMAIL=$(MOODLE_EMAIL)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_SITE_NAME=$(MOODLE_SITE_NAME)" >> /home/is214/e08g10t02-odoo17/.env
                echo "VM_PUBLIC_IP=$(VM_PUBLIC_IP)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_SKIP_BOOTSTRAP=yes" >> /home/is214/e08g10t02-odoo17/.env
                chmod 600 /home/is214/e08g10t02-odoo17/.env

          - task: SSH@0
            displayName: "Docker Compose Deploy"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml pull 2>&1
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml up -d 2>&1
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml ps 2>&1
          - task: SSH@0
            displayName: "Post-Deploy Moodle Fixes"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                echo "=== Waiting for Moodle to start ==="
                sleep 30
                echo "=== Fixing Moodle SSL and permissions ==="
                docker exec moodle_app bash -c "sed -i '/dbsslmode/d' /bitnami/moodle/config.php"
                docker exec moodle_app bash -c "sed -i \"s|'dbsocket' => '',|'dbsocket' => '',\n  'dbsslmode' => 'require',|\" /bitnami/moodle/config.php"
                docker exec moodle_app bash -c "chmod 755 /root && mkdir -p /root/.postgresql && chmod 755 /root/.postgresql"
                docker exec moodle_app bash -c "sed -i \"s|gondola.proxy.rlwy.net|odoo-db-azure.postgres.database.azure.com|\" /bitnami/moodle/config.php 2>/dev/null || true"
                docker exec moodle_app bash -c "sed -i \"s|'dbport' => 17343|'dbport' => 5432|\" /bitnami/moodle/config.php 2>/dev/null || true"
                docker restart moodle_app
                sleep 10
                echo "=== Verifying Moodle ==="
                docker logs moodle_app --tail 5 2>&1 || true
                echo "=== Post-deploy complete ==="


trigger:
  branches:
    include:
      - Staging
      - master

pool:
  name: Default

variables:
  repoUrl: 'https://github.com/joczx/e08g10t02-odoo17.git'
  updateScript: '/home/is214/deploy-temp/update_code.sh'
  stagePath: '/home/is214/'
  dockerProjectPath: '/home/is214/e08g10t02-odoo17'

stages:

# =========================
# STAGING STAGE
# =========================

- stage: Staging
  displayName: Deploy to Staging
  condition: eq(variables['Build.SourceBranchName'], 'Staging')

  jobs:
  - deployment: DeployStaging
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:

          # Sync code
          - task: SSH@0
            displayName: "Sync Code - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                echo "Deploying branch: $(Build.SourceBranchName)"
                cd $(stagePath)
                rm -rf deploy-temp odoo17 *-odoo17

                git clone -b Staging $(repoUrl) deploy-temp --quiet

                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github
          #debug
          - task: SSH@0
            displayName: "Debug - Cat script on server"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                echo "=== Script content ==="
                cat /home/is214/deploy-temp/update_code.sh
                echo "=== Running as user ==="
                whoami
          # Run update script
          - task: SSH@0
            displayName: "Run Update Script - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)


# =========================
# PRODUCTION STAGE (Docker)
# =========================
- stage: Production
  displayName: Deploy to Production (Docker)
  condition: eq(variables['Build.SourceBranchName'], 'master')

  jobs:
  - deployment: DeployProduction
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:

          # Pull latest code onto VM
          - task: SSH@0
            displayName: "Pull Latest Code"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                set -e
                echo "=== Pulling latest code ==="

                if [ -d "$(dockerProjectPath)" ]; then
                  cd $(dockerProjectPath)
                  git pull origin master
                else
                  cd $(stagePath)
                  git clone -b master $(repoUrl) e08g10t02-odoo17
                fi

          # Stop old services, deploy with Docker Compose
          - task: SSH@0
            displayName: "Docker Compose Deploy"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                set -e
                cd $(dockerProjectPath)

                echo "=== Pulling latest images ==="
                docker compose pull

                echo "=== Starting all services ==="
                docker compose up -d

                echo "=== Container status ==="
                docker compose ps

                echo "=== Deploy complete ==="

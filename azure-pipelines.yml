trigger:
  branches:
    include:
      - Staging
      - master
      - monitoring-staging

pool:
  name: Default

variables:
  repoUrl: 'https://github.com/joczx/e08g10t02-odoo17.git'
  updateScript: '/home/is214/deploy-temp/update_code.sh'
  stagePath: '/home/is214/'
  dockerProjectPath: '/home/is214/e08g10t02-odoo17'

stages:

# =========================
# STAGING STAGE
# =========================

- stage: Staging
  displayName: Deploy to Staging
  condition: eq(variables['Build.SourceBranchName'], 'Staging')

  jobs:
  - deployment: DeployStaging
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:

          - task: SSH@0
            displayName: "Sync Code - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                echo "Deploying branch: $(Build.SourceBranchName)"
                cd $(stagePath)
                rm -rf deploy-temp odoo17 *-odoo17

                git clone -b Staging $(repoUrl) deploy-temp --quiet

                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github

          - task: SSH@0
            displayName: "Debug - Cat script on server"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                echo "=== Script content ==="
                cat /home/is214/deploy-temp/update_code.sh
                echo "=== Running as user ==="
                whoami

          - task: SSH@0
            displayName: "Run Update Script - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)

- stage: StagingVM3
  displayName: 'Deploy to VM3'
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/Staging-vm3'))
  jobs:
  - job: DeployVM3
    pool: server
    steps:
    - task: SSH@0
      inputs:
        sshEndpoint: 'ssh-odoo17-vm3'
        runOptions: 'inline'
        inline: |
          cd /home/is214
          docker compose stop || true
          docker rm -f $(docker ps -aq) || true
          sudo rm -rf e08g10t02-odoo17
          git clone -b Staging-vm3 https://github.com/joczx/e08g10t02-odoo17.git
          cd e08g10t02-odoo17

          cat > .env << 'EOF'
          ODOO_PG_HOST=$(ODOO_PG_HOST)
          ODOO_PG_PORT=$(ODOO_PG_PORT)
          ODOO_PG_USER=$(ODOO_PG_USER)
          ODOO_PG_PASSWORD=$(ODOO_PG_PASSWORD)
          MOODLE_SKIP_BOOTSTRAP=yes
          EOF

          docker compose pull
          docker compose up -d
          docker compose ps

# =========================
# PRODUCTION STAGE (Docker)
# =========================
- stage: Production
  displayName: Deploy to Production (Docker)
  condition: eq(variables['Build.SourceBranchName'], 'master')

  jobs:
  - deployment: DeployProduction
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:

          - task: SSH@0
            displayName: "Stop Old Containers"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                echo "=== Stopping old containers ==="
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml stop 2>&1 || true
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml rm -f 2>&1 || true

          - task: SSH@0
            displayName: "Pull Latest Code"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                set -e
                echo "=== Pulling latest code ==="
                sudo rm -rf /home/is214/e08g10t02-odoo17
                sudo git clone -b master https://github.com/joczx/e08g10t02-odoo17.git /home/is214/e08g10t02-odoo17 2>&1
                sudo chown -R is214:is214 /home/is214/e08g10t02-odoo17

          - task: SSH@0
            displayName: "Write Environment File"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                set -e
                echo "=== Writing .env file ==="
                echo "ODOO_PG_HOST=$(ODOO_PG_HOST)" > /home/is214/e08g10t02-odoo17/.env
                echo "ODOO_PG_PORT=$(ODOO_PG_PORT)" >> /home/is214/e08g10t02-odoo17/.env
                echo "ODOO_PG_USER=$(ODOO_PG_USER)" >> /home/is214/e08g10t02-odoo17/.env
                echo "ODOO_PG_PASSWORD=$(ODOO_PG_PASSWORD)" >> /home/is214/e08g10t02-odoo17/.env
                echo "ODOO_PG_DB=$(ODOO_PG_DB)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_HOST=$(MOODLE_PG_HOST)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_PORT=$(MOODLE_PG_PORT)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_USER=$(MOODLE_PG_USER)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_PASSWORD=$(MOODLE_PG_PASSWORD)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_DB=$(MOODLE_PG_DB)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PG_SCHEMA=$(MOODLE_PG_SCHEMA)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_USERNAME=$(MOODLE_USERNAME)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_PASSWORD=$(MOODLE_PASSWORD)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_EMAIL=$(MOODLE_EMAIL)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_SITE_NAME=$(MOODLE_SITE_NAME)" >> /home/is214/e08g10t02-odoo17/.env
                echo "VM_PUBLIC_IP=$(VM_PUBLIC_IP)" >> /home/is214/e08g10t02-odoo17/.env
                echo "MOODLE_SKIP_BOOTSTRAP=$(MOODLE_SKIP_BOOTSTRAP)" >> /home/is214/e08g10t02-odoo17/.env
                chmod 600 /home/is214/e08g10t02-odoo17/.env

          - task: SSH@0
            displayName: "Docker Compose Deploy"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                set -e
                echo "=== Pulling latest images ==="
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml pull 2>&1

                echo "=== Starting all services ==="
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml up -d 2>&1

                echo "=== Container status ==="
                docker compose -f /home/is214/e08g10t02-odoo17/docker-compose.yml ps 2>&1

                echo "=== Deploy complete ==="


# =========================
# MONITORING STAGE
# =========================
- stage: Monitoring
  displayName: Deploy Monitoring (Traefik + Prometheus)
  condition: eq(variables['Build.SourceBranchName'], 'monitoring-staging')

  jobs:
  - deployment: DeployMonitoring
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:

          - task: SSH@0
            displayName: "Stop Old Containers"
            inputs:
              sshEndpoint: 'ssh-monitoring-staging'
              runOptions: commands
              commands: |
                echo "=== Stopping old containers ==="
                sudo docker compose -f /home/is214/e08g10t02-odoo17/vm1-monitoring/docker-compose.monitoring.yml stop 2>&1 || true
                sudo docker compose -f /home/is214/e08g10t02-odoo17/vm1-monitoring/docker-compose.monitoring.yml rm -f 2>&1 || true

          - task: SSH@0
            displayName: "Pull Latest Code"
            inputs:
              sshEndpoint: 'ssh-monitoring-staging'
              runOptions: commands
              commands: |
                set -e
                echo "=== Pulling latest code ==="
                sudo -n rm -rf /home/is214/e08g10t02-odoo17
                sudo -n git clone -b monitoring-staging https://github.com/joczx/e08g10t02-odoo17.git /home/is214/e08g10t02-odoo17 2>&1
                sudo -n chown -R is214:is214 /home/is214/e08g10t02-odoo17

          - task: SSH@0
            displayName: "Docker Compose Deploy"
            inputs:
              sshEndpoint: 'ssh-monitoring-staging'
              runOptions: commands
              commands: |
                set -e
                cd /home/is214/e08g10t02-odoo17/vm1-monitoring

                echo "=== Pulling latest images ==="
                sudo docker compose -f docker-compose.monitoring.yml pull 2>&1

                echo "=== Starting all services ==="
                sudo docker compose -f docker-compose.monitoring.yml up -d 2>&1

                echo "=== Container status ==="
                sudo docker compose -f docker-compose.monitoring.yml ps 2>&1

                echo "=== Deploy complete ==="
# =============================================================
# INSTRUCTIONS: Replace YOUR_VM_IP with your actual VM public IP
# Example: if your IP is 20.205.100.50, then the server_name
# for Odoo becomes: odoo.20.205.100.50.nip.io
#
# nip.io is a free wildcard DNS — no setup needed.
# anything.YOUR_IP.nip.io automatically resolves to YOUR_IP
# =============================================================

# ODOO
server {
    listen 80;
    server_name odoo.104.208.73.228.nip.io; #replaced ip

    location / {
        proxy_pass http://web:8069;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# MOODLE
server {
    listen 80;
    server_name moodle.104.208.73.228.nip.io; #replaced ip

    client_max_body_size 128M;

    location / {
        proxy_pass http://moodle:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# OSTICKET
server {
    listen 80;
    server_name osticket.104.208.73.228.nip.io; #replaced ip

    location / {
        proxy_pass http://osticket:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# DEFAULT — catch any other requests
server {
    listen 80 default_server;
    server_name _;
    return 404;
}

[options]
db_host = ODOO_DB_HOST
db_port = 5432
db_user = ODOO_DB_USER
db_password = ODOO_DB_PASSWORD
db_maxconn = 60
db_sslmode = require
proxy_mode = True
workers = 2
max_cron_threads = 1
limit_time_cpu = 600
limit_time_real = 1200
log_level = warn
list_db = False
admin_passwd = ODOO_ADMIN_PASSWORD
addons_path = /mnt/extra-addons,/mnt/extra-addons/helpdesk_mgmt,/mnt/extra-addons/helpdesk_mgmt_project,/mnt/extra-addons/helpdesk_mgmt_sale,/mnt/extra-addons/helpdesk_ticket_related,/mnt/extra-addons/helpdesk_type,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
db_name = ESMSOS
dbfilter = ^ESMSOS$
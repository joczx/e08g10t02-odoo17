entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  traefik:
    address: "127.0.0.1:8081"

api:
  dashboard: true
  insecure: true

metrics:
  prometheus:
    entryPoint: "traefik"

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@esmoshealth.me
      storage: /etc/traefik/acme.json
      tlsChallenge: {}

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.log"
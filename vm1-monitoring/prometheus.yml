global:
  scrape_interval: 15s
  evaluation_interval: 15s

remote_write:
  - url: GRAFANA_REMOTE_WRITE_URL
    basic_auth:
      username: 'GRAFANA_USERNAME'
      password: 'GRAFANA_PASSWORD'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          app: 'prometheus'

  - job_name: 'node-vm1-monitoring'
    static_configs:
      - targets: ['10.0.1.4:9100']
        labels:
          app: 'node-exporter'

  - job_name: 'node-vm2-odoomoodle'
    static_configs:
      - targets: ['10.0.1.5:9100']
        labels:
          app: 'node-exporter'

  - job_name: 'node-vm3-odoomoodle'
    static_configs:
      - targets: ['10.2.1.4:9100']
        labels:
          app: 'node-exporter'

  - job_name: 'traefik'
    static_configs:
      - targets: ['localhost:8081']
        labels:
          app: 'traefik'